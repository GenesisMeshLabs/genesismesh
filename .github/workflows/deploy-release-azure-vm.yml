name: Deploy Release to Azure VM

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      ref:
        description: "Git ref to deploy, usually a release tag such as v0.12.0"
        required: true
        default: "main"
      services:
        description: "Space-separated systemd services to restart"
        required: true
        default: "genesis-mesh-na genesis-mesh-node genesis-mesh-node-d"

concurrency:
  group: deploy-release-azure-vm
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy code to Azure VM
    runs-on: ubuntu-latest

    permissions:
      contents: read
      id-token: write

    env:
      AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
      AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
      AZURE_RESOURCE_GROUP: ${{ vars.AZURE_RESOURCE_GROUP }}
      AZURE_VM_NAME: ${{ vars.AZURE_VM_NAME }}
      RELEASE_TAG: ${{ github.event.release.tag_name }}
      INPUT_REF: ${{ github.event.inputs.ref }}
      INPUT_SERVICES: ${{ github.event.inputs.services }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Validate deployment configuration
        shell: bash
        run: |
          set -euo pipefail

          AZURE_RESOURCE_GROUP="$(printf '%s' "${AZURE_RESOURCE_GROUP:-}" | tr -d '\r\n')"
          AZURE_VM_NAME="$(printf '%s' "${AZURE_VM_NAME:-}" | tr -d '\r\n')"
          DEPLOY_REF="${RELEASE_TAG:-${INPUT_REF:-main}}"
          SERVICES="${INPUT_SERVICES:-genesis-mesh-na genesis-mesh-node genesis-mesh-node-d}"

          if [ -z "${AZURE_CLIENT_ID:-}" ]; then
            echo "AZURE_CLIENT_ID secret is required" >&2
            exit 1
          fi
          if [ -z "${AZURE_SUBSCRIPTION_ID:-}" ]; then
            echo "AZURE_SUBSCRIPTION_ID secret is required" >&2
            exit 1
          fi
          if [ -z "${AZURE_TENANT_ID:-}" ]; then
            echo "AZURE_TENANT_ID secret is required" >&2
            exit 1
          fi
          if [ -z "$AZURE_RESOURCE_GROUP" ]; then
            echo "AZURE_RESOURCE_GROUP repository variable is required" >&2
            exit 1
          fi
          if [ -z "$AZURE_VM_NAME" ]; then
            echo "AZURE_VM_NAME repository variable is required" >&2
            exit 1
          fi
          if ! [[ "$DEPLOY_REF" =~ ^[A-Za-z0-9._/@:-]+$ ]]; then
            echo "Deployment ref contains unsupported characters: $DEPLOY_REF" >&2
            exit 1
          fi
          for service in $SERVICES; do
            if ! [[ "$service" =~ ^[A-Za-z0-9_.@-]+$ ]]; then
              echo "Service name contains unsupported characters: $service" >&2
              exit 1
            fi
          done

      - name: Azure login
        uses: azure/login@v2
        with:
          client-id: ${{ env.AZURE_CLIENT_ID }}
          tenant-id: ${{ env.AZURE_TENANT_ID }}
          subscription-id: ${{ env.AZURE_SUBSCRIPTION_ID }}

      - name: Deploy release and restart services
        shell: bash
        run: |
          set -euo pipefail

          AZURE_RESOURCE_GROUP="$(printf '%s' "${AZURE_RESOURCE_GROUP:-}" | tr -d '\r\n')"
          AZURE_VM_NAME="$(printf '%s' "${AZURE_VM_NAME:-}" | tr -d '\r\n')"
          DEPLOY_REF="${RELEASE_TAG:-${INPUT_REF:-main}}"
          SERVICES="${INPUT_SERVICES:-genesis-mesh-na genesis-mesh-node genesis-mesh-node-d}"

          if ! [[ "$DEPLOY_REF" =~ ^[A-Za-z0-9._/@:-]+$ ]]; then
            echo "Deployment ref contains unsupported characters: $DEPLOY_REF" >&2
            exit 1
          fi
          for service in $SERVICES; do
            if ! [[ "$service" =~ ^[A-Za-z0-9_.@-]+$ ]]; then
              echo "Service name contains unsupported characters: $service" >&2
              exit 1
            fi
          done

          echo "Deploying ${DEPLOY_REF} to Azure VM ${AZURE_VM_NAME} in ${AZURE_RESOURCE_GROUP}"
          echo "Restarting services: ${SERVICES}"

          {
            printf 'DEPLOY_REF=%q\n' "$DEPLOY_REF"
            printf 'SERVICES=%q\n' "$SERVICES"
            cat <<'SCRIPT'
          set -euo pipefail

          REPO_DIR=/opt/genesis-mesh

          if [ ! -d "$REPO_DIR/.git" ]; then
            echo "ERROR: $REPO_DIR is not a Git checkout" >&2
            exit 1
          fi

          REPO_USER="$(stat -c '%U' "$REPO_DIR")"
          echo "==> Repository owner: $REPO_USER"

          echo "==> Current revision"
          if [ "$REPO_USER" = "root" ]; then
            cd "$REPO_DIR"
            git config --global --add safe.directory "$REPO_DIR" || true
            git log -1 --oneline || true
          else
            sudo -H -u "$REPO_USER" bash -lc "cd '$REPO_DIR' && git log -1 --oneline || true"
          fi

          echo "==> Backing up Network Authority database"
          mkdir -p /var/lib/genesis-mesh/backups
          if [ -f /var/lib/genesis-mesh/na.db ]; then
            cp /var/lib/genesis-mesh/na.db "/var/lib/genesis-mesh/backups/na.db.$(date -u +%Y%m%d-%H%M%S).bak"
          else
            echo "No /var/lib/genesis-mesh/na.db found; skipping DB backup"
          fi

          echo "==> Fetching release and updating Python environment"
          if [ "$REPO_USER" = "root" ]; then
            env DEPLOY_REF="$DEPLOY_REF" bash <<'REPO_SCRIPT'
          set -euo pipefail
          cd /opt/genesis-mesh
          git config --global --add safe.directory /opt/genesis-mesh || true
          git fetch --tags origin
          if git show-ref --verify --quiet "refs/tags/$DEPLOY_REF"; then
            git checkout --force "tags/$DEPLOY_REF"
          elif git show-ref --verify --quiet "refs/remotes/origin/$DEPLOY_REF"; then
            git checkout --force "origin/$DEPLOY_REF"
          else
            git checkout --force "$DEPLOY_REF"
          fi
          if [ ! -d .venv ]; then
            python3 -m venv .venv
          fi
          . .venv/bin/activate
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          python -m pip install -e .
          python -m compileall genesis_mesh -q
          REPO_SCRIPT
          else
            sudo -H -u "$REPO_USER" env DEPLOY_REF="$DEPLOY_REF" bash <<'REPO_SCRIPT'
          set -euo pipefail
          cd /opt/genesis-mesh
          git fetch --tags origin
          if git show-ref --verify --quiet "refs/tags/$DEPLOY_REF"; then
            git checkout --force "tags/$DEPLOY_REF"
          elif git show-ref --verify --quiet "refs/remotes/origin/$DEPLOY_REF"; then
            git checkout --force "origin/$DEPLOY_REF"
          else
            git checkout --force "$DEPLOY_REF"
          fi
          if [ ! -d .venv ]; then
            python3 -m venv .venv
          fi
          . .venv/bin/activate
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          python -m pip install -e .
          python -m compileall genesis_mesh -q
          REPO_SCRIPT
          fi

          cd "$REPO_DIR"

          echo "==> Installing systemd unit files"
          cp infrastructure/systemd/genesis-mesh-na.service /etc/systemd/system/genesis-mesh-na.service
          cp infrastructure/systemd/genesis-mesh-node.service /etc/systemd/system/genesis-mesh-node.service
          cp infrastructure/systemd/genesis-mesh-node-d.service /etc/systemd/system/genesis-mesh-node-d.service
          mkdir -p /etc/systemd/system/genesis-mesh-na.service.d
          cp infrastructure/systemd/genesis-mesh-na.override.conf /etc/systemd/system/genesis-mesh-na.service.d/override.conf
          systemctl daemon-reload

          echo "==> Restarting services"
          for service in $SERVICES; do
            systemctl restart "$service"
          done

          sleep 5

          echo "==> Checking service state"
          for service in $SERVICES; do
            systemctl is-active --quiet "$service"
            systemctl status "$service" --no-pager --lines=5
          done

          echo "==> Probing Network Authority"
          curl -fsS http://127.0.0.1:8443/healthz
          echo
          curl -fsS http://127.0.0.1:8443/readyz
          echo
          curl -fsS http://127.0.0.1:8443/connectome.json >/tmp/genesis-mesh-connectome.json
          python - <<'PY'
          import json
          from pathlib import Path

          data = json.loads(Path("/tmp/genesis-mesh-connectome.json").read_text())
          print(
              "connectome-ok",
              f"sovereigns={len(data.get('sovereigns', []))}",
              f"edges={len(data.get('recognition_edges', []))}",
              f"revocations={len(data.get('imported_revocations', []))}",
          )
          PY

          echo "==> Deployment complete"
          if [ "$REPO_USER" = "root" ]; then
            git log -1 --oneline
          else
            sudo -H -u "$REPO_USER" bash -lc "cd '$REPO_DIR' && git log -1 --oneline"
          fi
          SCRIPT
          } > /tmp/deploy-genesis-mesh.sh

          az vm run-command invoke \
            --resource-group "$AZURE_RESOURCE_GROUP" \
            --name "$AZURE_VM_NAME" \
            --command-id RunShellScript \
            --scripts @/tmp/deploy-genesis-mesh.sh \
            --query "value[].message" \
            --output tsv

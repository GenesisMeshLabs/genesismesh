# Replace the placeholder values with real base64-encoded contents before applying.
#
# Generate the inputs locally:
#   genesis-mesh init                        # produces genesis.signed.json and na.key
#   cat .genesis-mesh/genesis.signed.json | base64 -w0
#   cat .genesis-mesh/keys/na.key           | base64 -w0
#   cat .genesis-mesh/keys/operator.pub     # base64 already, embed into the JSON below
#
# Do not commit real secret values to version control.

apiVersion: v1
kind: Secret
metadata:
  name: genesis-mesh-na
  namespace: genesis-mesh
type: Opaque
data:
  genesis.signed.json: REPLACE_WITH_BASE64_GENESIS_BLOCK
  na.key: REPLACE_WITH_BASE64_NA_PRIVATE_KEY
---
apiVersion: v1
kind: Secret
metadata:
  name: genesis-mesh-operators
  namespace: genesis-mesh
type: Opaque
stringData:
  operator-public-keys.json: |
    {"operator-local": "REPLACE_WITH_BASE64_OPERATOR_PUBLIC_KEY"}
